<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="6" y="6" width="52" height="52" rx="16" fill="url(#bg)" filter="url(#shadow)"/>
  <text x="50%" y="53%" text-anchor="middle" dominant-baseline="middle"
        font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800"
        fill="#ffffff" letter-spacing="-1">YZ</text>
</svg>
